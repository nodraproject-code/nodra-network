<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .nodra-pulse {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00dd00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f0f;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer circle border -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="rgba(0, 255, 255, 0.2)" stroke-width="2"/>

  <!-- Letter N made of nodes and connections -->
  <g id="letter-n">
    <!-- Left vertical line (cyan side) -->
    <line x1="150" y1="150" x2="150" y2="370" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Diagonal line connecting left to right -->
    <line x1="150" y1="370" x2="360" y2="150" stroke="url(#greenGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Right vertical line (green side) -->
    <line x1="360" y1="150" x2="360" y2="370" stroke="url(#greenGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Connection nodes - Top left (cyan) -->
    <circle cx="150" cy="150" r="12" fill="url(#cyanGrad)" class="nodra-pulse"/>
    <circle cx="150" cy="150" r="10" fill="rgba(0, 255, 255, 0.3)"/>

    <!-- Connection nodes - Middle junction (both colors) -->
    <circle cx="150" cy="370" r="12" fill="url(#cyanGrad)"/>
    <circle cx="150" cy="370" r="10" fill="rgba(0, 255, 255, 0.3)"/>
    
    <circle cx="360" cy="150" r="12" fill="url(#greenGrad)" class="nodra-pulse"/>
    <circle cx="360" cy="150" r="10" fill="rgba(0, 255, 65, 0.3)"/>

    <!-- Connection nodes - Bottom right (green) -->
    <circle cx="360" cy="370" r="12" fill="url(#greenGrad)"/>
    <circle cx="360" cy="370" r="10" fill="rgba(0, 255, 65, 0.3)"/>

    <!-- Middle diagonal nodes -->
    <circle cx="200" cy="290" r="8" fill="rgba(0, 255, 255, 0.6)"/>
    <circle cx="310" cy="200" r="8" fill="rgba(0, 255, 65, 0.6)"/>
  </g>

  <!-- Inner glow effect -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(0, 255, 255, 0.1)" stroke-width="1" opacity="0.5"/>
  
  <!-- Subtle accent lines forming a hexagon-like pattern for tech feel -->
  <g stroke="rgba(0, 255, 255, 0.15)" stroke-width="1" fill="none" opacity="0.4">
    <polygon points="256,100 350,180 350,330 256,410 162,330 162,180"/>
  </g>
</svg>
