<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #00ffff) drop-shadow(0 0 4px #00ffff); }
        50% { filter: drop-shadow(0 0 4px #00ffff) drop-shadow(0 0 8px #00ff41); }
      }
      .nodra-logo { animation: glow 3s ease-in-out infinite; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0f0f0f"/>

  <!-- NODRA N Logo -->
  <g class="nodra-logo">
    <!-- Left vertical line of N -->
    <line x1="20" y1="15" x2="20" y2="85" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>

    <!-- Right vertical line of N -->
    <line x1="80" y1="15" x2="80" y2="85" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>

    <!-- Diagonal line of N -->
    <line x1="20" y1="75" x2="80" y2="25" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>

    <!-- Corner nodes for network effect -->
    <circle cx="20" cy="15" r="4" fill="#00ffff"/>
    <circle cx="20" cy="85" r="4" fill="#00ffff"/>
    <circle cx="80" cy="15" r="4" fill="#00ff41"/>
    <circle cx="80" cy="85" r="4" fill="#00ff41"/>
  </g>
</svg>
